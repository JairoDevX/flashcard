{% extends 'base.html' %}
{% block title %}Excluir Card – FlashCards{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-cream to-red-50/50 flex items-center justify-center px-4">
  <div class="bg-white rounded-3xl shadow-xl p-7 max-w-sm w-full text-center">
    <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold text-gray-800 mb-3">Excluir Card</h2>
    <div class="bg-gray-50 rounded-xl p-3 mb-4 text-left">
      <p class="text-sm font-medium text-gray-700">{{ card.front }}</p>
      <p class="text-xs text-gray-400 mt-1">{{ card.back }}</p>
    </div>
    <p class="text-xs text-red-400 mb-6">O histórico de revisão deste card também será removido.</p>
    <div class="flex gap-3">
      <a href="{% url 'deck_detail' deck.pk %}"
         class="flex-1 py-3 border-2 border-gray-200 text-gray-600 font-semibold rounded-2xl hover:bg-gray-50 transition-all text-sm">
        Cancelar
      </a>
      <form method="post" class="flex-1">
        {% csrf_token %}
        <button type="submit"
                class="w-full py-3 bg-red-500 text-white font-semibold rounded-2xl hover:bg-red-600 active:scale-[0.98] transition-all text-sm">
          Excluir
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
